<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 930" font-family="'Inter', 'Helvetica Neue', sans-serif">

  <!-- paper -->
  <rect width="720" height="930" fill="#FFFFFF"/>

  <defs>
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#EEE"/>
    </pattern>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.05"/>
    </filter>
  </defs>
  <rect width="720" height="930" fill="url(#grid)"/>

  <!-- header -->
  <text x="48" y="62" font-size="20" font-weight="700" fill="#111" letter-spacing="-0.3">doma, basically.</text>
  <text x="48" y="82" font-size="10.5" fill="#777" font-style="italic">notebook page, not a pitch deck · reading /agentic-commerce · may 2026</text>
  <path d="M 48 92 Q 90 88, 130 92 T 210 92" fill="none" stroke="#111" stroke-width="1.3"/>
  <text x="660" y="62" font-size="9" fill="#BBB" font-style="italic">pg. 1 / of many</text>

  <!-- SECTION 1 -->
  <text x="48" y="128" font-size="11" font-weight="600" fill="#333">(1)  the setup</text>
  <line x1="48" y1="134" x2="80" y2="134" stroke="#333" stroke-width="1"/>

  <ellipse cx="140" cy="192" rx="72" ry="36" fill="#FAFAFA" stroke="#333" stroke-width="1.3"/>
  <text x="140" y="188" font-size="10" fill="#222" text-anchor="middle" font-weight="600">registrar</text>
  <text x="140" y="202" font-size="8.5" fill="#888" text-anchor="middle">(godaddy, namecheap..)</text>

  <text x="250" y="196" font-size="14" fill="#555">=</text>
  <text x="268" y="180" font-size="8" fill="#999" font-style="italic">same .com</text>
  <text x="268" y="192" font-size="8" fill="#999" font-style="italic">two representations</text>

  <g transform="translate(400 150) rotate(-1.5)">
    <rect x="0" y="0" width="170" height="85" rx="6" fill="#F0F7FF" stroke="#3A6EA5" stroke-width="1.3" filter="url(#sh)"/>
    <text x="14" y="22" font-size="10" font-weight="600" fill="#2C5282">domain token</text>
    <text x="14" y="40" font-size="8.5" fill="#5A7FA8" font-family="'JetBrains Mono', monospace">erc-721 · doma chain</text>
    <text x="14" y="56" font-size="8.5" fill="#5A7FA8">transfers = ownership</text>
    <text x="14" y="70" font-size="8.5" fill="#5A7FA8">dns still works. fully.</text>
  </g>

  <path d="M 210 192 C 280 192, 340 192, 400 192" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="5,3"/>
  <polygon points="400,192 392,188 392,196" fill="#333"/>

  <g transform="translate(600 150)">
    <path d="M -8 32 Q 2 35, 10 42" fill="none" stroke="#E89B2D" stroke-width="1.2"/>
    <text x="14" y="30" font-size="9" fill="#B87714" font-style="italic">the weird trick:</text>
    <text x="14" y="42" font-size="9" fill="#B87714" font-style="italic">dns registrar +</text>
    <text x="14" y="54" font-size="9" fill="#B87714" font-style="italic">onchain token,</text>
    <text x="14" y="66" font-size="9" fill="#B87714" font-style="italic">kept in sync.</text>
    <text x="14" y="82" font-size="9" fill="#B87714" font-style="italic">icann doesn't hate</text>
    <text x="14" y="94" font-size="9" fill="#B87714" font-style="italic">it. that's the part.</text>
  </g>

  <!-- SECTION 2 -->
  <text x="48" y="290" font-size="11" font-weight="600" fill="#333">(2)  agents show up. how do they know what to do?</text>
  <line x1="48" y1="296" x2="80" y2="296" stroke="#333" stroke-width="1"/>

  <g transform="translate(70 320)">
    <rect x="0" y="0" width="240" height="110" rx="3" fill="#FFFDF3" stroke="#C9A24B" stroke-width="1.2" filter="url(#sh)"/>
    <path d="M 218 0 L 240 0 L 240 22 Z" fill="#F0E2B5" stroke="#C9A24B" stroke-width="1"/>
    <path d="M 218 0 L 218 22 L 240 22" fill="none" stroke="#C9A24B" stroke-width="1"/>
    <text x="16" y="22" font-size="9.5" font-weight="600" fill="#6B4A0B" font-family="'JetBrains Mono', monospace">/.well-known/skills/</text>
    <text x="16" y="36" font-size="9.5" font-weight="600" fill="#6B4A0B" font-family="'JetBrains Mono', monospace">trade-tokens/SKILL.md</text>
    <line x1="16" y1="46" x2="220" y2="46" stroke="#E5D5A0" stroke-width="0.8"/>
    <text x="16" y="62" font-size="8.5" fill="#8B6B2B">"to list a domain,</text>
    <text x="16" y="74" font-size="8.5" fill="#8B6B2B"> sign payload X, post to /list"</text>
    <text x="16" y="92" font-size="8.5" fill="#8B6B2B">"to bid, include usdc proof"</text>
    <text x="16" y="104" font-size="8" fill="#BBA060" font-style="italic">...plain english. no sdk.</text>
  </g>

  <g transform="translate(380 340)">
    <circle cx="45" cy="45" r="42" fill="#F8F8F8" stroke="#222" stroke-width="1.3"/>
    <text x="45" y="40" font-size="10" text-anchor="middle" font-weight="600" fill="#111">agent</text>
    <text x="45" y="54" font-size="8.5" text-anchor="middle" fill="#777">wallet + goal</text>
    <text x="45" y="66" font-size="8" text-anchor="middle" fill="#AAA" font-style="italic">+ a prompt</text>
  </g>

  <path d="M 315 375 C 345 375, 360 380, 380 385" fill="none" stroke="#222" stroke-width="1"/>
  <polygon points="380,385 373,382 372,390" fill="#222"/>
  <text x="318" y="365" font-size="8.5" fill="#777" font-style="italic">read at runtime</text>

  <g transform="translate(500 320)">
    <path d="M -10 50 Q -20 50, -25 40 Q -30 30, -15 20" fill="none" stroke="#C54848" stroke-width="1.2"/>
    <polygon points="-25,40 -21,35 -17,42" fill="#C54848"/>
    <rect x="0" y="10" width="195" height="95" rx="5" fill="#FFF6F6" stroke="#C54848" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="12" y="28" font-size="10" font-weight="700" fill="#8B2C2C">hot take</text>
    <text x="12" y="46" font-size="9" fill="#6B2020">the token isn't the</text>
    <text x="12" y="58" font-size="9" fill="#6B2020">innovation. the markdown</text>
    <text x="12" y="70" font-size="9" fill="#6B2020">file is. it kills the need</text>
    <text x="12" y="82" font-size="9" fill="#6B2020">for sdks, docs portals,</text>
    <text x="12" y="94" font-size="9" fill="#6B2020">and api key onboarding.</text>
  </g>

  <!-- SECTION 3 -->
  <text x="48" y="500" font-size="11" font-weight="600" fill="#333">(3)  the payment loop — http 402 rides again</text>
  <line x1="48" y1="506" x2="80" y2="506" stroke="#333" stroke-width="1"/>

  <rect x="60" y="530" width="110" height="52" rx="8" fill="#F8F8F8" stroke="#222" stroke-width="1.2" filter="url(#sh)"/>
  <text x="115" y="555" font-size="10" text-anchor="middle" font-weight="600" fill="#111">agent</text>
  <text x="115" y="570" font-size="8" text-anchor="middle" fill="#888">wants payroll.com</text>

  <path d="M 172 548 C 230 548, 260 548, 300 548" fill="none" stroke="#333" stroke-width="1"/>
  <polygon points="300,548 292,544 292,552" fill="#333"/>
  <text x="184" y="540" font-size="8" fill="#999">POST /bid</text>

  <rect x="302" y="530" width="120" height="52" rx="8" fill="#FAFAFA" stroke="#222" stroke-width="1.2" filter="url(#sh)"/>
  <text x="362" y="555" font-size="10" text-anchor="middle" font-weight="600" fill="#111">doma endpoint</text>
  <text x="362" y="570" font-size="8" text-anchor="middle" fill="#888">marketplace api</text>

  <path d="M 302 578 C 260 600, 220 600, 172 578" fill="none" stroke="#C54848" stroke-width="1.3"/>
  <polygon points="172,578 178,574 178,582" fill="#C54848"/>
  <text x="216" y="615" font-size="9" fill="#8B2C2C" font-weight="600">&#8592; HTTP 402  "pay first"</text>

  <path d="M 172 618 C 230 640, 280 640, 302 618" fill="none" stroke="#3DA63D" stroke-width="1.3"/>
  <polygon points="302,618 294,614 294,622" fill="#3DA63D"/>
  <text x="186" y="660" font-size="9" fill="#2D7A2D" font-weight="600">&#8594; retry + usdc signed tx</text>
  <text x="186" y="672" font-size="8" fill="#5A9E5A" font-style="italic">(eip-3009 transfer auth)</text>

  <path d="M 302 678 C 260 690, 220 690, 172 678" fill="none" stroke="#222" stroke-width="1"/>
  <polygon points="172,678 178,674 178,682" fill="#222"/>
  <text x="220" y="708" font-size="9" fill="#444">&#8592; 200 OK · domain transferred</text>

  <g transform="translate(450 530)">
    <path d="M -8 30 Q -20 32, -28 28" fill="none" stroke="#888" stroke-width="1"/>
    <rect x="0" y="0" width="230" height="120" rx="5" fill="#FAFAFA" stroke="#CCC" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="12" y="22" font-size="10" font-weight="600" fill="#333">why this is funny</text>
    <text x="12" y="40" font-size="9" fill="#555">http 402 was defined in 1997.</text>
    <text x="12" y="54" font-size="9" fill="#555">sat unused for 29 years.</text>
    <text x="12" y="68" font-size="9" fill="#555">"reserved for future use."</text>
    <line x1="12" y1="76" x2="180" y2="76" stroke="#DDD" stroke-width="0.5"/>
    <text x="12" y="92" font-size="9" fill="#222" font-style="italic">the future showed up and</text>
    <text x="12" y="104" font-size="9" fill="#222" font-style="italic">it turned out to be bots</text>
    <text x="12" y="116" font-size="9" fill="#222" font-style="italic">buying things.</text>
  </g>

  <!-- SECTION 4 -->
  <text x="48" y="760" font-size="11" font-weight="600" fill="#333">(4)  so what does this unlock</text>
  <line x1="48" y1="766" x2="80" y2="766" stroke="#333" stroke-width="1"/>

  <g transform="translate(50 780)">
    <circle cx="6" cy="12" r="3" fill="#111"/>
    <text x="18" y="16" font-size="10" fill="#222">fund manager can finally touch domains as an asset class —</text>
    <text x="18" y="30" font-size="10" fill="#222">they become loan collateral, fractionalized, rented for campaigns</text>
  </g>

  <g transform="translate(50 820)">
    <circle cx="6" cy="12" r="3" fill="#111"/>
    <text x="18" y="16" font-size="10" fill="#222">startups tell an agent what they need. wake up with a brand.</text>
    <text x="18" y="30" font-size="10" fill="#222">no DMs, no escrow.com, no 14 day wait for the ex-owner to reply</text>
  </g>

  <g transform="translate(50 860)">
    <circle cx="6" cy="12" r="3" fill="#111"/>
    <text x="18" y="16" font-size="10" fill="#222">skill file + x402 + token = template for a LOT of agent commerce.</text>
    <text x="18" y="30" font-size="10" fill="#222">domains are just the first asset where it actually ships end-to-end</text>
  </g>

  <ellipse cx="340" cy="875" rx="125" ry="14" fill="none" stroke="#E89B2D" stroke-width="1.3" transform="rotate(-1 340 875)"/>
  <path d="M 465 880 Q 485 890, 490 905" fill="none" stroke="#E89B2D" stroke-width="1"/>
  <text x="495" y="908" font-size="9" fill="#B87714" font-style="italic">&#8592; this is the bet</text>

  <line x1="48" y1="910" x2="672" y2="910" stroke="#EEE" stroke-width="0.5"/>

</svg>
