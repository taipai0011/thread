<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>doma notebook diagram</title>
<style>
  body { margin: 0; padding: 40px; background: #F4F4F0; font-family: system-ui, sans-serif; display: flex; justify-content: center; }
  .frame { background: white; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
  .note { max-width: 720px; margin: 0 auto 20px; color: #666; font-size: 13px; }
  .note b { color: #111; }
  img { display: block; max-width: 720px; height: auto; }
</style>
</head>
<body>
<div>
  <div class="note">
    <b>doma-notebook.svg</b> &middot; open in browser, right-click image &rarr; "save as" or screenshot for PNG.
  </div>
  <div class="frame">
    <img src="doma-notebook.svg" alt="doma agentic flow diagram">
  </div>
</div>
</body>
</html>
